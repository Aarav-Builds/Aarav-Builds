<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 320" width="880" height="320" font-family="'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Aarav's career journey timeline">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f78166"/>
      <stop offset="30%" stop-color="#2dd4bf"/>
      <stop offset="55%" stop-color="#a78bfa"/>
      <stop offset="80%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .card   { fill:#0d1117; stroke:#30363d; stroke-width:1.2; }
      .title  { fill:#e6edf3; font-size:20px; font-weight:700; }
      .sub    { fill:#8b949e; font-size:12px; }
      .track  { stroke:#21262d; stroke-width:4; stroke-linecap:round; }
      .progress { stroke:url(#line); stroke-width:4; stroke-linecap:round; fill:none;
                  stroke-dasharray:712; stroke-dashoffset:712; animation:draw 2.2s ease forwards; }
      .node   { transform-box:fill-box; transform-origin:center; transform:scale(0); }
      .n0 { animation:pop .55s cubic-bezier(.34,1.56,.64,1) .45s forwards; }
      .n1 { animation:pop .55s cubic-bezier(.34,1.56,.64,1) .90s forwards; }
      .n2 { animation:pop .55s cubic-bezier(.34,1.56,.64,1) 1.35s forwards; }
      .n3 { animation:pop .55s cubic-bezier(.34,1.56,.64,1) 1.80s forwards; }
      .n4 { animation:pop .55s cubic-bezier(.34,1.56,.64,1) 2.25s forwards; }
      .halo { transform-box:fill-box; transform-origin:center; opacity:0;
              animation:haze 2.6s ease-in-out infinite; }
      .h0 { animation-delay:1.0s; } .h1 { animation-delay:1.45s; } .h2 { animation-delay:1.9s; }
      .h3 { animation-delay:2.35s; } .h4 { animation-delay:2.8s; }
      .lbl  { opacity:0; }
      .l0 { animation:rise .6s ease .70s forwards; }
      .l1 { animation:rise .6s ease 1.15s forwards; }
      .l2 { animation:rise .6s ease 1.60s forwards; }
      .l3 { animation:rise .6s ease 2.05s forwards; }
      .l4 { animation:rise .6s ease 2.50s forwards; }
      .stem { stroke:#30363d; stroke-width:1.6; opacity:0; animation:show .5s ease forwards; }
      .year { font-size:13px; font-weight:700; }
      .role { fill:#e6edf3; font-size:12.5px; font-weight:600; }
      .org  { fill:#8b949e; font-size:11px; }
      .pulse { fill:#fff; opacity:0; animation:travel 3.4s ease-in-out 2.6s infinite; }
      @keyframes draw   { to { stroke-dashoffset:0; } }
      @keyframes pop    { 0%{transform:scale(0);} 70%{transform:scale(1.3);} 100%{transform:scale(1);} }
      @keyframes rise   { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }
      @keyframes show   { to { opacity:1; } }
      @keyframes haze   { 0%,100%{opacity:.15;} 50%{opacity:.5;} }
      @keyframes travel { 0%{transform:translateX(0); opacity:0;} 8%{opacity:.9;}
                          92%{opacity:.9;} 100%{transform:translateX(712px); opacity:0;} }
    </style>
  </defs>

  <rect class="card" x="1" y="1" width="878" height="318" rx="16"/>
  <text class="title" x="40" y="46">Career Journey</text>
  <text class="sub"   x="40" y="66">From classroom to enterprise ERP — building the whole way.</text>

  <!-- timeline at y=185, nodes at x = 90, 268, 446, 624, 802 -->
  <line class="track" x1="90" y1="185" x2="802" y2="185"/>
  <path class="progress" d="M90 185 H802"/>

  <!-- node 0 : 2023 — SMU (above) -->
  <line class="stem l0" x1="90" y1="185" x2="90" y2="138"/>
  <g class="lbl l0">
    <text class="year" x="90" y="118" text-anchor="middle" fill="#f78166">2023</text>
    <text class="role" x="90" y="98"  text-anchor="middle">B.Sc. Computer Science</text>
    <text class="org"  x="90" y="82"  text-anchor="middle">Saint Mary's University</text>
  </g>
  <circle class="halo h0" cx="90" cy="185" r="13" fill="#f78166"/>
  <circle class="node n0" cx="90" cy="185" r="8" fill="#0d1117" stroke="#f78166" stroke-width="3" filter="url(#glow)"/>

  <!-- node 1 : Apr 2024 — Katbotz (below) -->
  <line class="stem l1" x1="268" y1="185" x2="268" y2="232"/>
  <g class="lbl l1">
    <text class="year" x="268" y="252" text-anchor="middle" fill="#2dd4bf">Apr 2024</text>
    <text class="role" x="268" y="270" text-anchor="middle">Cloud ERP Automation Engineer</text>
    <text class="org"  x="268" y="286" text-anchor="middle">Katbotz LLC</text>
  </g>
  <circle class="halo h1" cx="268" cy="185" r="13" fill="#2dd4bf"/>
  <circle class="node n1" cx="268" cy="185" r="8" fill="#0d1117" stroke="#2dd4bf" stroke-width="3" filter="url(#glow)"/>

  <!-- node 2 : Sep 2024 — TA (above) -->
  <line class="stem l2" x1="446" y1="185" x2="446" y2="138"/>
  <g class="lbl l2">
    <text class="year" x="446" y="118" text-anchor="middle" fill="#a78bfa">Sep 2024</text>
    <text class="role" x="446" y="98"  text-anchor="middle">Teaching Assistant</text>
    <text class="org"  x="446" y="82"  text-anchor="middle">Saint Mary's University</text>
  </g>
  <circle class="halo h2" cx="446" cy="185" r="13" fill="#a78bfa"/>
  <circle class="node n2" cx="446" cy="185" r="8" fill="#0d1117" stroke="#a78bfa" stroke-width="3" filter="url(#glow)"/>

  <!-- node 3 : Sep 2025 — Nova Scotia Power (below) -->
  <line class="stem l3" x1="624" y1="185" x2="624" y2="232"/>
  <g class="lbl l3">
    <text class="year" x="624" y="252" text-anchor="middle" fill="#fbbf24">Sep 2025</text>
    <text class="role" x="624" y="270" text-anchor="middle">Data Analyst / Business Analyst</text>
    <text class="org"  x="624" y="286" text-anchor="middle">Nova Scotia Power</text>
  </g>
  <circle class="halo h3" cx="624" cy="185" r="13" fill="#fbbf24"/>
  <circle class="node n3" cx="624" cy="185" r="8" fill="#0d1117" stroke="#fbbf24" stroke-width="3" filter="url(#glow)"/>

  <!-- node 4 : 2027 — Graduating (above) -->
  <line class="stem l4" x1="802" y1="185" x2="802" y2="138"/>
  <g class="lbl l4">
    <text class="year" x="802" y="118" text-anchor="middle" fill="#58a6ff">2027</text>
    <text class="role" x="802" y="98"  text-anchor="middle">Graduating</text>
    <text class="org"  x="802" y="82"  text-anchor="middle">B.Sc. — SMU</text>
  </g>
  <circle class="halo h4" cx="802" cy="185" r="13" fill="#58a6ff"/>
  <circle class="node n4" cx="802" cy="185" r="8" fill="#0d1117" stroke="#58a6ff" stroke-width="3" filter="url(#glow)"/>

  <!-- traveling pulse -->
  <circle class="pulse" cx="90" cy="185" r="4.5" filter="url(#glow)"/>
</svg>
